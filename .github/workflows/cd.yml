name: CD

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

jobs:
  validate:
    name: Validate before deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  package:
    name: Package artifact
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          mkdir -p dist
          tar -czf dist/negotium-${{ github.ref_name || github.sha }}.tar.gz \
            --exclude='.git' \
            --exclude='dist' \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='.seen_jobs.json' \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: negotium-${{ github.ref_name || github.sha }}
          path: dist/
          retention-days: 90

  deploy:
    name: Deploy (${{ github.event.inputs.environment || 'production' }})
    runs-on: ubuntu-latest
    needs: package
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: negotium-${{ github.ref_name || github.sha }}
          path: dist/

      - name: Deploy
        run: |
          echo "🚀 Deploying Negotium ${{ github.ref_name || github.sha }}"
          echo "   Environment: ${{ github.event.inputs.environment || 'production' }}"
          echo "   Artifact: $(ls dist/)"
          echo ""
          echo "📦 Deployment artifact ready."
          echo "   Configure your deployment target (VPS, cloud instance, etc.)"
          echo "   by adding deployment steps to this job."
